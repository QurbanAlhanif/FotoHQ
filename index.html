<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kamera Qurban Al-Hanif</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 10px; }
    /* Memastikan container kamera stabil */
    #video { width: 100%; height: 300px; background: #000; object-fit: cover; }
    .btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; margin-top: 10px; font-weight: bold; border-radius: 5px; }
  </style>
</head>
<body>

<div class="container">
  <video id="video" autoplay playsinline></video>
  <button class="btn" onclick="takePhoto()">AMBIL FOTO</button>
  <div id="status" style="margin-top:10px; font-weight:bold;"></div>
</div>

<script>
  const video = document.getElementById('video');

  // FUNGSI KAMERA PALING STABIL (TANPA LOGIKA RIBET)
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: { exact: "environment" } } 
      });
      video.srcObject = stream;
    } catch (err) {
      // Jika kamera belakang exact gagal, coba kamera default
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
      } catch (e) {
        document.getElementById('status').innerText = "Kamera tidak bisa diakses!";
      }
    }
  }

  function takePhoto() {
    // Fungsi snap sederhana
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const data = canvas.toDataURL('image/jpeg', 0.5);
    document.getElementById('status').innerText = "Foto Berhasil Diambil.";
    console.log("Data foto siap:", data.substring(0, 50));
  }

  window.onload = startCamera;
</script>
</body>
</html>
