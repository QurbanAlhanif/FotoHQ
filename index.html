<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Foto Qurban Al-Hanif</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    .tab-active { background-color: #059669; color: white; border-color: #059669; }
    .tab-inactive { background-color: #f3f4f6; color: #374151; border-color: #d1d5db; }
    #video-container { background-color: #000; width: 100%; height: 60vh; max-height: 400px; position: relative; border-radius: 0.5rem; overflow: hidden; }
    #video, #preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    #camLoadText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; z-index: 10; width: 100%; text-align: center; }
  </style>
</head>
<body class="bg-slate-100 p-4 font-sans max-w-md mx-auto">

  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    
    <!-- HEADER -->
    <div class="bg-emerald-600 p-4 text-white text-center">
      <h1 class="text-xl font-bold tracking-tight">DASHBOARD FOTO</h1>
      <p class="text-emerald-100 text-sm">Qurban Alhanif 1447H</p>
    </div>

    <!-- TABS MENU -->
    <div class="flex p-2 gap-2 bg-slate-50 border-b border-slate-200">
      <button id="btnTab1" onclick="pindahTab(1)" class="flex-1 py-2 text-xs font-bold rounded-lg border tab-active transition-colors">KANDANG</button>
      <button id="btnTab2" onclick="pindahTab(2)" class="flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">SEMBELIH 1</button>
      <button id="btnTab3" onclick="pindahTab(3)" class="flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">SEMBELIH 2</button>
    </div>

    <div class="p-4 space-y-4">
      
      <!-- IDENTITAS PETUGAS -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-slate-700 uppercase">Nama Petugas</label>
          <input type="text" id="petugas" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500" placeholder="Cth: Zawawi" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-700 uppercase">Inisial Petugas</label>
          <input type="text" id="inisial" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500" placeholder="Cth: ZW" required>
        </div>
      </div>

      <!-- PILIHAN ID HEWAN -->
      <div>
        <label class="text-[10px] font-bold text-slate-700 uppercase">Pilih ID Qurban</label>
        <div id="infoLoadingData" class="text-xs text-amber-600 mb-1 font-medium hidden"><i class="fas fa-spinner fa-spin"></i> Mengambil data ID...</div>
        <select id="idHewan" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 bg-slate-50 font-bold">
          <option value="">-- MENGAMBIL DATA --</option>
        </select>
      </div>

      <!-- KAMERA UTAMA -->
      <div id="video-container" class="shadow-inner">
        <div id="camLoadText">⏳ Menyalakan Kamera...</div>
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display: none;" alt="Hasil Foto">
      </div>

      <button id="btnSnap" onclick="ambilGambar()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">
        <i class="fas fa-camera"></i> AMBIL FOTO
      </button>

      <!-- JALUR DARURAT -->
      <div class="border-t border-slate-200 pt-4 mt-4">
        <label class="text-[10px] font-bold text-slate-700 uppercase mb-2 block">Jalur Darurat (Jika Kamera Gelap)</label>
        <input type="file" id="fileDarurat" accept="image/*" onchange="prosesFotoDarurat(this)" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
      </div>

      <!-- TOMBOL UPLOAD -->
      <button id="btnSubmit" onclick="uploadDataKeSheet()" disabled class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-400 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg mt-4">
        <i class="fas fa-cloud-upload-alt"></i> UPLOAD KE SERVER
      </button>
      
      <div id="statusUpload" class="text-center text-sm font-bold mt-2 hidden"></div>

    </div>
  </div>

  <script>
    // =========================================================================
    // KONFIGURASI UTAMA: GANTI DENGAN URL WEB APPS AMIZA!
    // =========================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwu9x3PyUFmlK1sxHHS0b3SjoTLHJTK_a8g0WN-HVMlF6u0gbEiH8RpdbEq6pMqq9lR/exec"; 

    let currentTab = 1;
    let streamObj = null;
    let fotoBase64Data = null;
    let dataDatabaseLokal = [];

    window.onload = () => {
      aktifkanKameraBelakang();
      updateDropdown();
    };

    // --- NAVIGASI TAB ---
    function pindahTab(tabNum) {
      currentTab = tabNum;
      for(let i=1; i<=3; i++) {
        const btn = document.getElementById('btnTab'+i);
        if(i === tabNum) {
          btn.classList.replace('tab-inactive', 'tab-active');
        } else {
          btn.classList.replace('tab-active', 'tab-inactive');
        }
      }
      resetBidikanKamera();
      updateDropdown();
    }

    // --- MENGAMBIL DATA DROPDOWN DARI GOOGLE SHEET ---
    function updateDropdown() {
      document.getElementById('infoLoadingData').style.display = 'block';
      const selectObj = document.getElementById('idHewan');
      selectObj.innerHTML = '<option value="">-- MENGAMBIL DATA... --</option>';
      
      const oldScript = document.getElementById('jsonp-ids');
      if (oldScript) oldScript.remove();

      window.handleDropdownData = function(list) {
        document.getElementById('infoLoadingData').style.display = 'none';
        dataDatabaseLokal = list;
        selectObj.innerHTML = '<option value="">-- PILIH ID --</option>';
        if(!list || list.length === 0) {
          selectObj.innerHTML = '<option value="">-- SEMUA FOTO SUDAH LENGKAP --</option>';
          return;
        }
        list.forEach(item => {
          let opt = document.createElement('option');
          opt.value = item.id;
          opt.text = `ID ${item.id} - ${item.jenis} - ${item.nama}`;
          selectObj.appendChild(opt);
        });
      };

      const script = document.createElement('script');
      script.id = 'jsonp-ids';
      script.src = `${API_URL}?action=getAllData&tab=${currentTab}&callback=handleDropdownData`;
      document.body.appendChild(script);
    }

    // --- KAMERA UTAMA (STABIL ANTI-BLACKSCREEN) ---
    async function aktifkanKameraBelakang() {
      const video = document.getElementById('video');
      const camLoadText = document.getElementById('camLoadText');
      
      if (streamObj) {
        streamObj.getTracks().forEach(track => track.stop());
      }
      
      camLoadText.style.display = 'block';
      camLoadText.innerText = '⏳ Menyalakan Kamera...';
      video.style.display = 'block';
      document.getElementById('preview').style.display = 'none';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
        streamObj = stream;
        video.srcObject = stream;
        video.onplaying = () => { camLoadText.style.display = 'none'; };
      } catch (err) {
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
          streamObj = fallbackStream;
          video.srcObject = fallbackStream;
          video.onplaying = () => { camLoadText.style.display = 'none'; };
        } catch (e) {
          camLoadText.innerText = "❌ Kamera Tidak Ditemukan";
        }
      }
    }

    // --- PROSES BIDIK GAMBAR ---
    function ambilGambar() {
      const video = document.getElementById('video');
      const preview = document.getElementById('preview');
      const btnSnap = document.getElementById('btnSnap');
      const btnSubmit = document.getElementById('btnSubmit');

      if (btnSnap.innerText.includes("AMBIL FOTO")) {
        // Ambil resolusi proporsional asli dari sensor agar tidak gepeng
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Kompresi stabil di angka 0.5
        fotoBase64Data = canvas.toDataURL('image/jpeg', 0.5);

        preview.src = fotoBase64Data;
        preview.style.display = 'block';
        video.style.display = 'none'; 
        
        if (streamObj) streamObj.getTracks().forEach(track => track.stop());

        btnSnap.innerHTML = '<i class="fas fa-undo"></i> ULANG FOTO';
        btnSnap.classList.replace('bg-slate-800', 'bg-red-600');
        btnSnap.classList.replace('hover:bg-slate-700', 'hover:bg-red-700');
        btnSubmit.disabled = false;
      } else {
        resetBidikanKamera();
        aktifkanKameraBelakang(); 
      }
    }

    function resetBidikanKamera() {
      fotoBase64Data = null;
      document.getElementById('preview').style.display = 'none';
      document.getElementById('video').style.display = 'block';
      document.getElementById('btnSubmit').disabled = true;
      document.getElementById('fileDarurat').value = "";
      
      const btnSnap = document.getElementById('btnSnap');
      btnSnap.innerHTML = '<i class="fas fa-camera"></i> AMBIL FOTO';
      btnSnap.classList.replace('bg-red-600', 'bg-slate-800');
      btnSnap.classList.replace('hover:bg-red-700', 'hover:bg-slate-700');
    }

    // --- JALUR FOTO DARURAT STABIL ---
    function prosesFotoDarurat(input) {
      if (input.files && input.files[0]) {
        document.getElementById('camLoadText').style.display = 'none';
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            fotoBase64Data = canvas.toDataURL('image/jpeg', 0.5);
            
            document.getElementById('preview').src = fotoBase64Data;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('video').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
            
            const btnSnap = document.getElementById('btnSnap');
            btnSnap.innerHTML = '<i class="fas fa-undo"></i> ULANG FOTO';
            btnSnap.classList.replace('bg-slate-800', 'bg-red-600');
            btnSnap.classList.replace('hover:bg-slate-700', 'hover:bg-slate-700');
            if (streamObj) streamObj.getTracks().forEach(track => track.stop());
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // --- PENGIRIMAN DATA KE GOOGLE SERVER ---
    function uploadDataKeSheet() {
      const petugas = document.getElementById('petugas').value.trim();
      const inisial = document.getElementById('inisial').value.trim();
      const idHewan = document.getElementById('idHewan').value;

      if (!petugas || !inisial || !idHewan) {
        alert("⚠️ Mohon lengkapi Nama Petugas, Inisial, dan Pilih ID Hewan!");
        return;
      }

      // Validasi Anti-Duplikat
      const validID = dataDatabaseLokal.find(item => item.id.toString() === idHewan);
      if (!validID) {
        alert("⚠️ ID " + idHewan + " tidak ditemukan di daftar saat ini.");
        return;
      }

      if (!fotoBase64Data) {
        alert("⚠️ Foto belum diambil!");
        return;
      }

      const btnSubmit = document.getElementById('btnSubmit');
      const statusDiv = document.getElementById('statusUpload');
      
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MENGUPLOAD...';
      statusDiv.style.display = 'block';
      statusDiv.className = 'text-center text-sm font-bold mt-2 text-blue-600';
      statusDiv.innerText = "Mengirim data ke server, mohon tunggu...";

      // Ekstrak base64 murni tanpa awalan data:image/jpeg;base64,
      const base64DataMurni = fotoBase64Data.split(',')[1];

      const payload = {
        tab: currentTab,
        petugas: petugas,
        inisial: inisial,
        idHewan: validID.id,
        namaPequrban: validID.nama,
        kodeTipe: validID.kodeTipe || "HQ",
        mimeType: 'image/jpeg',
        base64: base64DataMurni
      };

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        statusDiv.className = 'text-center text-sm font-bold mt-2 text-emerald-600';
        statusDiv.innerText = "✅ " + (result.status || "Upload Berhasil!");
        alert("Upload Berhasil!");
        
        // Reset form setelah upload sukses
        resetBidikanKamera();
        aktifkanKameraBelakang();
        updateDropdown();
        btnSubmit.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> UPLOAD KE SERVER';
      })
      .catch(error => {
        console.error('Error:', error);
        statusDiv.className = 'text-center text-sm font-bold mt-2 text-red-600';
        statusDiv.innerText = "❌ Terjadi Kesalahan. Coba lagi.";
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> COBA UPLOAD LAGI';
        alert("Gagal mengupload foto. Silakan coba lagi.");
      });
    }
  </script>
</body>
</html>
