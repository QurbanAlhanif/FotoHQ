<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Foto Qurban Al-Hanif</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2e7d32; --bg: #f1f8e9; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
    
    /* Desain Switch Mode Pengatur Hari */
    .mode-switcher { display: flex; background: #e0e0e0; padding: 5px; gap: 5px; border-bottom: 2px solid #ccc; }
    .btn-mode { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 8px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
    .btn-mode.active-mode { background: #fff; color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    
    .tabs { display: flex; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: #888; display: block; }
    .tab.active { background: white; color: var(--primary); border-top: 3px solid var(--primary); }
    .content { padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; }
    input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
   .camera-container { width: 100%; max-width: 320px; height: 240px; margin: 0 auto 10px auto; position: relative; background: #000; border-radius: 10px; overflow: hidden; line-height: 0; }
    video { width: 100%; height: 240px; object-fit: cover; background: #000; }
    .preview-img { width: 100%; max-width: 320px; height: 240px; object-fit: cover; margin: 0 auto 10px auto; border-radius: 10px; display: none; border: 2px solid var(--primary); }
    .info-box { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 13px; }
    .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
    .btn-snap { background: #1565c0; }
    .btn:disabled { background: #cccccc; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-size: 13px; display: none; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="container">
  <!-- PENGATUR SWITCH MODE HARI (HANYA MUNCUL JIKA DIAKSES ADMIN) -->
  <div class="mode-switcher" id="adminPanel" style="display: none;">
    <button class="btn-mode active-mode" id="mode1" onclick="setModeHari('pra')">📅 Mode Kandang</button>
    <button class="btn-mode" id="mode2" onclick="setModeHari('h')">🥩 Mode Hari-H (Sembelih)</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabMenu1" onclick="switchTab(1, this)">KANDANG</div>
    <div class="tab" id="tabMenu2" onclick="switchTab(2, this)">SEMBELIH 1</div>
    <div class="tab" id="tabMenu3" onclick="switchTab(3, this)">SEMBELIH 2</div>
  </div>

  <div class="content">
    <div class="form-group">
      <label>Nama Petugas (Inisial)</label>
      <div style="display:flex; gap:10px;">
        <!-- TAMBAHKAN REQUIRED DI SINI -->
        <input type="text" id="petugas" placeholder="Nama" required>
        <input type="text" id="inisial" placeholder="Inisial" style="width:100px;" required>
      </div>
    </div>

    <div class="form-group">
      <label>Nomor ID Hewan</label>
      <!-- TAMBAHKAN REQUIRED DI SINI -->
      <input list="listID" id="idHewan" oninput="getDetail()" placeholder="Ketik atau pilih ID..." required>
      <datalist id="listID"></datalist>
    </div>

    <div id="infoBox" class="info-box">
      <strong>Pequrban:</strong> <span id="txtNama"></span><br>
      <strong>Jenis:</strong> <span id="txtJenis"></span>
      <input type="hidden" id="kodeTipe">
    </div>


    <div class="form-group">
      <label>Bidik Kamera ke Hewan Qurban</label>
      <!-- PASTIKAN VIDEO DAN PREVIEW DI DALAM SATU KOTAK INI -->
      <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <img id="preview" class="preview-img" alt="Hasil Foto">
      </div>
      <button class="btn btn-snap" id="btnSnap" onclick="ambilGambar()">📸 AMBIL FOTO</button>
    </div>

    <button class="btn" id="btnSubmit" onclick="uploadDataKeSheet()" disabled>🚀 UPLOAD DATA FOTO</button>
    <div id="status"></div>

    <div style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center;">
      <label style="font-size: 11px; color: #888;">Kamera Cadangan (jika tidak muncul layar kamera):</label>
      <input type="file" accept="image/*" capture="environment" onchange="prosesFotoDarurat(this)" style="margin-top: 5px; font-size: 12px; background: #f5f5f5; padding: 5px; border-radius: 5px; width:90%">
    </div>
  </div>
</div>

<script>
  // Hubungkan dengan URL Web App Google Apps Script Om Za yang asli
  const API_URL = "https://script.google.com/macros/s/AKfycbwu9x3PyUFmlK1sxHHS0b3SjoTLHJTK_a8g0WN-HVMlF6u0gbEiH8RpdbEq6pMqq9lR/exec"; 

  let currentTab = 1;
  let streamObj = null;
  let fotoBase64Data = null;

  window.onload = () => {
    // Membaca parameter yang ada di URL Browser
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('pencet'); // Mengambil teks setelah kata '?pencet='
    const setMode = urlParams.get('hari') || 'pra'; // Default awal adalah 'pra' jika tidak diatur

    // KUNCI RAHASIA: Jika link mengandung kata ?pencet=admin, maka panel tombol dimunculkan
    if (role === 'admin') {
      document.getElementById('adminPanel').style.display = 'flex';
    }

    // Jalankan setelan mode hari sesuai perintah URL
    setModeHari(setMode);
    aktifkanKameraBelakang();
  };

  // LOGIKA SWITCH TOMBOL PENGATUR HARI
  function setModeHari(mode) {
    const btnPra = document.getElementById('mode1');
    const btnHariH = document.getElementById('mode2');
    const tab1 = document.getElementById('tabMenu1');
    const tab2 = document.getElementById('tabMenu2');
    const tab3 = document.getElementById('tabMenu3');

    document.getElementById('idHewan').value = "";
    document.getElementById('infoBox').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    resetBidikanKamera();

    if (mode === 'pra') {
      btnPra.classList.add('active-mode');
      btnHariH.classList.remove('active-mode');
      
      // Sembunyikan Kandang dan Sembelih, Tampilkan Pra-H
      tab1.style.display = 'block';
      tab2.style.display = 'none';
      tab3.style.display = 'none';
      
      switchTab(1, tab1);
    } else {
      btnPra.classList.remove('active-mode');
      btnHariH.classList.add('active-mode');
      
      // Sembunyikan Pra-H, Tampilkan Kandang dan Sembelih bersamaan
      tab1.style.display = 'none';
      tab2.style.display = 'block';
      tab3.style.display = 'block';
      
      switchTab(2, tab2); // Langsung arahkan default ke Tab Kandang
    }
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('idHewan').value = "";
    document.getElementById('infoBox').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    resetBidikanKamera();
    updateDropdown();
  }

  function aktifkanKameraBelakang() {
    if (streamObj) { streamObj.getTracks().forEach(track => track.stop()); }
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: 1280, height: 720 }, audio: false })
      .then(stream => { streamObj = stream; video.srcObject = stream; })
      .catch(err => { console.log("Kamera terblokir, menunggu input darurat."); });
  }

  function updateDropdown() {
    const oldScript = document.getElementById('jsonp-ids');
    if (oldScript) oldScript.remove();

    window.handleDropdownData = function(list) {
      const dl = document.getElementById('listID');
      dl.innerHTML = "";
      list.forEach(id => { 
        let opt = document.createElement('option'); 
        opt.value = id; 
        dl.appendChild(opt); 
      });
    };

    const script = document.createElement('script');
    script.id = 'jsonp-ids';
    script.src = `${API_URL}?action=getIDs&tab=${currentTab}&callback=handleDropdownData`;
    document.body.appendChild(script);
  }

  function getDetail() {
    const id = document.getElementById('idHewan').value.trim();
    if(!id) { document.getElementById('infoBox').style.display = 'none'; return; }
    
    const oldScript = document.getElementById('jsonp-detail');
    if (oldScript) oldScript.remove();

    window.handleDetailData = function(data) {
      if(data) {
        document.getElementById('infoBox').style.display = 'block';
        document.getElementById('txtNama').innerText = data.nama;
        document.getElementById('txtJenis').innerText = data.jenis;
        document.getElementById('kodeTipe').value = data.kodeTipe;
      } else {
        document.getElementById('infoBox').style.display = 'none';
      }
    };

    const script = document.createElement('script');
    script.id = 'jsonp-detail';
    script.src = `${API_URL}?action=getDetail&id=${id}&callback=handleDetailData`;
    document.body.appendChild(script);
  }

function ambilGambar() {
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const btnSnap = document.getElementById('btnSnap');
    const btnSubmit = document.getElementById('btnSubmit');

    if (btnSnap.innerText.includes("AMBIL FOTO")) {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      fotoBase64Data = canvas.toDataURL('image/jpeg', 0.75);

      preview.src = fotoBase64Data;
      preview.style.display = 'block';
      video.style.display = 'none'; // Sembunyikan video asli
      
      // Matikan aliran kamera aktif agar tidak membuat duplikasi di bawah
      if (streamObj) {
        streamObj.getTracks().forEach(track => track.stop());
      }

      btnSnap.innerHTML = "🔄 ULANG FOTO";
      btnSnap.style.background = "#e53935";
      btnSubmit.disabled = false;
    } else {
      resetBidikanKamera();
      aktifkanKameraBelakang(); // Hidupkan kembali kamera saat tombol ULANG FOTO ditekan
    }
  }

  function resetBidikanKamera() {
    document.getElementById('preview').style.display = 'none';
    document.getElementById('video').style.display = 'block';
    fotoBase64Data = null;
    document.getElementById('btnSnap').innerHTML = "📸 AMBIL FOTO";
    document.getElementById('btnSnap').style.background = "#1565c0";
    document.getElementById('btnSubmit').disabled = true;
  }

  function prosesFotoDarurat(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.readAsDataURL(input.files[0]);
      reader.onload = function(e) {
        fotoBase64Data = e.target.result; 
        document.getElementById('preview').src = fotoBase64Data;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('video').style.display = 'none';
        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSnap').innerHTML = "🔄 ULANG FOTO";
        document.getElementById('btnSnap').style.background = "#e53935";
      };
    }
  }

function uploadDataKeSheet() {
    const petugas = document.getElementById('petugas').value.trim();
    const inisial = document.getElementById('inisial').value.trim();
    const idHewan = document.getElementById('idHewan').value.trim();

    // VALIDASI KETAT GANTI SENSOR REQUIRED BROWSER
    if (!petugas) { alert("⚠️ NAMA PETUGAS WAJIB DIISI!"); return; }
    if (!inisial) { alert("⚠️ INISIAL WAJIB DIISI!"); return; }
    if (!idHewan) { alert("⚠️ NOMOR ID HEWAN WAJIB DIPILIH!"); return; }
    if (!fotoBase64Data) { alert("⚠️ FOTO HEWAN BELUM DIAMBIL! Silakan bidik kamera terlebih dahulu."); return; }

    const btn = document.getElementById('btnSubmit');
    const btnSnap = document.getElementById('btnSnap');
    const status = document.getElementById('status');
    
    btn.disabled = true;
    btnSnap.disabled = true;
    status.style.display = 'block';
    status.style.background = '#fff3cd';
    status.innerText = "Memproses & Mengirim Laporan...";

    const payload = {
      tab: currentTab,
      petugas: petugas,
      inisial: inisial,
      idHewan: idHewan,
      namaPequrban: document.getElementById('txtNama').innerText,
      jenisHQ: document.getElementById('txtJenis').innerText,
      kodeTipe: document.getElementById('kodeTipe').value,
      base64: fotoBase64Data.split(",")[1],
      mimeType: "image/jpeg"
    };

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'contents';
    input.value = JSON.stringify(payload);
    
    form.appendChild(input);
    document.body.appendChild(form);

    const iframeName = 'upload-iframe-target';
    let iframe = document.getElementById(iframeName);
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.id = iframeName;
      iframe.style.style.display = 'none';
      document.body.appendChild(iframe);
    }

    form.target = iframeName;
    form.submit();

    setTimeout(() => {
      let teksSukses = "Berhasil! Foto ID " + payload.idHewan.padStart(3, '0') + " telah tersimpan ke Google Sheet";
      if (currentTab == 3) {
        teksSukses += " & WA Terkirim.";
      } else {
        teksSukses += ".";
      }
      
      status.innerText = teksSukses;
      status.style.background = '#e8f5e9';
      btnSnap.disabled = false;
      document.getElementById('idHewan').value = "";
      document.getElementById('infoBox').style.display = 'none'; 
      resetBidikanKamera();
      form.remove();
      
      setTimeout(updateDropdown, 1500);
    }, 2500);
  }
</script>
</body>
</html>
