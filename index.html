<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Foto Qurban Al-Hanif</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2e7d32; --bg: #f1f8e9; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
    
    /* Desain Switch Mode Pengatur Hari */
    .mode-switcher { display: flex; background: #e0e0e0; padding: 5px; gap: 5px; border-bottom: 2px solid #ccc; }
    .btn-mode { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 8px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
    .btn-mode.active-mode { background: #fff; color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    
    .tabs { display: flex; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: #888; display: block; }
    .tab.active { background: white; color: var(--primary); border-top: 3px solid var(--primary); }
    .content { padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; }
    input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    
    /* KOTAK KAMERA RESPONSIF - PORTRAIT DEFAULT */
    .camera-container { width: 100%; max-width: 280px; height: 380px; margin: 0 auto 10px auto; position: relative; background: #000; border-radius: 10px; overflow: hidden; line-height: 0; }
    video { width: 100%; height: 380px; object-fit: cover; background: #000; }
    .preview-img { width: 100%; max-width: 280px; height: 380px; object-fit: cover; margin: 0 auto 10px auto; border-radius: 10px; display: none; border: 2px solid var(--primary); }
    
    /* OTOMATIS BERUBAH LANDSCAPE JIKA HP DIMIRINGKAN */
    @media screen and (orientation: landscape) {
      .camera-container { max-width: 450px; height: 250px; }
      video, .preview-img { height: 250px; }
    }

   /* TEKS LOADING INDIKATOR KAMERA HITAM */
    .camera-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      z-index: 10;
      pointer-events: none;
      animation: kedip 1.5s infinite;
      display: none;
      /* TAMBAHAN AGAR TEKS TIDAK TERJEPIT: */
      line-height: normal;
      width: 100%;
      text-align: center;
    }
    
    @keyframes kedip {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    .info-box { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 13px; }
    .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
    .btn-snap { background: #1565c0; }
    .btn:disabled { background: #cccccc; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-size: 13px; display: none; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="container">
  <!-- PENGATUR SWITCH MODE HARI (HANYA MUNCUL JIKA DIAKSES ADMIN) -->
  <div class="mode-switcher" id="adminPanel" style="display: none;">
    <button class="btn-mode active-mode" id="mode1" onclick="setModeHari('pra')">📅 Mode Kandang</button>
    <button class="btn-mode" id="mode2" onclick="setModeHari('h')">🥩 Mode Hari-H (Sembelih)</button>
  </div>

  <!-- PENAMAAAN TAB BARU SESUAI ALUR KEINGINAN AMIZA -->
  <div class="tabs">
    <div class="tab active" id="tabMenu1" onclick="switchTab(1, this)">KANDANG</div>
    <div class="tab" id="tabMenu2" onclick="switchTab(2, this)">SEMBELIH 1</div>
    <div class="tab" id="tabMenu3" onclick="switchTab(3, this)">SEMBELIH 2</div>
  </div>

  <div class="content">
    <div class="form-group">
      <label>Nama Petugas (Inisial)</label>
      <div style="display:flex; gap:10px;">
        <input type="text" id="petugas" placeholder="Nama" required>
        <input type="text" id="inisial" placeholder="Inisial" style="width:100px;" required>
      </div>
    </div>

    <div class="form-group">
      <label>Nomor ID Hewan</label>
      <input list="listID" id="idHewan" oninput="getDetail()" placeholder="Ketik atau pilih ID..." required>
      <datalist id="listID"></datalist>
    </div>

    <div id="infoBox" class="info-box">
      <strong>Nomor ID Klop:</strong> <span id="txtIdTerpilih" style="color: #2e7d32; font-weight: bold;"></span><br>
      <strong>Pequrban:</strong> <span id="txtNama"></span><br>
      <strong>Jenis:</strong> <span id="txtJenis"></span>
      <input type="hidden" id="kodeTipe">
    </div>

    <div class="form-group">
      <label>Bidik Kamera ke Hewan Qurban</label>
      <div class="camera-container">
        <div class="camera-loading" id="camLoadText">⏳ Membuka Kamera...</div>
        <video id="video" autoplay playsinline onplaying="document.getElementById('camLoadText').style.display='none'"></video>
        <img id="preview" class="preview-img" alt="Hasil Foto">
      </div>
      <button class="btn btn-snap" id="btnSnap" onclick="ambilGambar()">📸 AMBIL FOTO</button>
    </div>

    <button class="btn" id="btnSubmit" onclick="uploadDataKeSheet()" disabled>🚀 UPLOAD DATA FOTO</button>
    <div id="status"></div>

    <div style="margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center;">
      <label style="font-size: 11px; color: #888;">Kamera Cadangan (jika tidak muncul layar kamera):</label>
      <input type="file" accept="image/*" capture="environment" onchange="prosesFotoDarurat(this)" style="margin-top: 5px; font-size: 12px; background: #f5f5f5; padding: 5px; border-radius: 5px; width:90%">
    </div>
  </div>
</div>

<script>
  // Hubungkan dengan URL Web App Google Apps Script Om Za yang asli
  const API_URL = "https://script.google.com/macros/s/AKfycbwu9x3PyUFmlK1sxHHS0b3SjoTLHJTK_a8g0WN-HVMlF6u0gbEiH8RpdbEq6pMqq9lR/exec"; 

  let currentTab = 1;
  let streamObj = null;
  let fotoBase64Data = null;
  let dataDatabaseLokal = [];

  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('pencet'); 
    const setMode = urlParams.get('hari') || 'pra'; 

    if (role === 'admin') {
      document.getElementById('adminPanel').style.display = 'flex';
    }

    setModeHari(setMode);
    aktifkanKameraBelakang();
  };

  // LOGIKA SWITCH TOMBOL ADMIN UNTUK MENGATUR FILTER VISIBILITAS TAB
  function setModeHari(mode) {
    const btnPra = document.getElementById('mode1');
    const btnHariH = document.getElementById('mode2');
    const tab1 = document.getElementById('tabMenu1');
    const tab2 = document.getElementById('tabMenu2');
    const tab3 = document.getElementById('tabMenu3');

    document.getElementById('idHewan').value = "";
    document.getElementById('infoBox').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    resetBidikanKamera();

    if (mode === 'pra') {
      btnPra.classList.add('active-mode');
      btnHariH.classList.remove('active-mode');
      
      // Mode Kandang: Hanya buka Tab 1 (Kandang)
      tab1.style.display = 'block';
      tab2.style.display = 'none';
      tab3.style.display = 'none';
      
      switchTab(1, tab1);
    } else {
      btnPra.classList.remove('active-mode');
      btnHariH.classList.add('active-mode');
      
      // Mode Hari-H: Sembunyikan Kandang, Buka Sembelih 1 & Sembelih 2 bersamaan
      tab1.style.display = 'none';
      tab2.style.display = 'block';
      tab3.style.display = 'block';
      
      switchTab(2, tab2); // Default melompat ke Sembelih 1
    }
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('idHewan').value = "";
    document.getElementById('infoBox').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    resetBidikanKamera();
    updateDropdown();
    aktifkanKameraBelakang();
  }

  // =========================================================================
  // FUNGSI KAMERA ANTI-LAYAR HITAM (VERSI INJEKSI PAKSA)
  // =========================================================================
  async function aktifkanKameraBelakang() {
    const video = document.getElementById('video');
    const camLoadText = document.getElementById('camLoadText');
    
    // Matikan semua stream yang aktif di seluruh halaman
    const devices = await navigator.mediaDevices.enumerateDevices();
    if (streamObj) {
        streamObj.getTracks().forEach(track => track.stop());
    }
    
    if (camLoadText) {
      camLoadText.style.display = 'block';
      camLoadText.innerText = "⏳ Inisialisasi Kamera...";
    }
    
    video.style.display = 'block';
    document.getElementById('preview').style.display = 'none';

    try {
      // Paksa pakai kamera belakang tanpa constraint lebar/tinggi yang ribet
      const constraints = {
        video: { facingMode: { exact: "environment" } }
      };

      streamObj = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = streamObj;
      
      // Tunggu stream siap
      await video.play();
      camLoadText.style.display = 'none';

    } catch (err) {
      console.log("Gagal environment, mencoba kamera default:", err);
      try {
        // Fallback: Kamera mana saja
        const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
        streamObj = fallback;
        video.srcObject = streamObj;
        await video.play();
        camLoadText.style.display = 'none';
      } catch (e) {
        if (camLoadText) {
           camLoadText.style.display = 'block';
           camLoadText.innerText = "❌ Kamera Tidak Ditemukan / Izin Diblokir.";
        }
      }
    }
  }

  function updateDropdown() {
    const oldScript = document.getElementById('jsonp-ids');
    if (oldScript) oldScript.remove();

    document.getElementById('infoBox').style.display = 'none';
    
    const dl = document.getElementById('listID');
    dl.innerHTML = ""; 
    
    const status = document.getElementById('status');
    if (status) {
      status.style.display = 'block';
      status.style.background = '#e3f2fd';
      status.innerText = "⏳ Sinkronisasi data ID dari Google Sheet...";
    }

    window.handleDropdownData = function(list) {
      if (status) status.style.display = 'none';
      
      if (!list || list.length === 0) {
        alert("⚠️ Perhatian: Tidak ada data ID hewan yang kosong (belum difoto) pada Tab " + currentTab + " saat ini.");
        dataDatabaseLokal = [];
        return;
      }

      dataDatabaseLokal = list; 
      list.forEach(item => { 
        let opt = document.createElement('option'); 
        opt.value = item.id;
        dl.appendChild(opt); 
      });
    };

    const script = document.createElement('script');
    script.id = 'jsonp-ids';
    script.src = `${API_URL}?action=getAllData&tab=${currentTab}&callback=handleDropdownData`;
    
    script.onerror = function() {
      if (status) {
        status.style.background = '#ffebee';
        status.innerText = "❌ Gagal menyambung ke Server Google. Periksa koneksi internet atau link API_URL Amiza!";
      }
    };
    document.body.appendChild(script);
  }

  function getDetail() {
    const idInput = document.getElementById('idHewan').value.trim();
    const infoBox = document.getElementById('infoBox');
    
    if(!idInput) { infoBox.style.display = 'none'; return; }
    
    const dataKlop = dataDatabaseLokal.find(item => item.id.toString().trim() === idInput);

    if (dataKlop) {
      infoBox.style.display = 'block';
      document.getElementById('txtIdTerpilih').innerText = idInput.padStart(3, '0');
      document.getElementById('txtNama').innerText = dataKlop.nama;
      document.getElementById('txtJenis').innerText = dataKlop.jenis;
      document.getElementById('kodeTipe').value = dataKlop.kodeTipe;
    } else {
      infoBox.style.display = 'none';
    }
  }

  function ambilGambar() {
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const btnSnap = document.getElementById('btnSnap');
    const btnSubmit = document.getElementById('btnSubmit');

    if (btnSnap.innerText.includes("AMBIL FOTO")) {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 720;
      canvas.height = video.videoHeight || 1280;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Tambahkan Watermark
      ctx.font = "bold 30px Arial";
      ctx.fillStyle = "white";
      ctx.fillText("Al-Hanif 1447H", 20, 1250);
      
      fotoBase64Data = canvas.toDataURL('image/jpeg', 0.60); //kompresi 0.6

      preview.src = fotoBase64Data;
      preview.style.display = 'block';
      video.style.display = 'none'; 
      
      if (streamObj) {
        streamObj.getTracks().forEach(track => track.stop());
      }

      btnSnap.innerHTML = "🔄 ULANG FOTO";
      btnSnap.style.background = "#e53935";
      btnSubmit.disabled = false;
    } else {
      resetBidikanKamera();
      aktifkanKameraBelakang(); 
    }
  }

  function resetBidikanKamera() {
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    
    if (streamObj) {
      streamObj.getTracks().forEach(track => track.stop());
      streamObj = null;
    }
    
    if (video) {
      video.srcObject = null;
      video.style.display = 'block';
    }
    if (preview) preview.style.display = 'none';
    
    fotoBase64Data = null;
    
    document.getElementById('btnSnap').innerHTML = "📸 AMBIL FOTO";
    document.getElementById('btnSnap').style.background = "#1565c0";
    document.getElementById('btnSubmit').disabled = true;
  }

  function prosesFotoDarurat(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = 720;
          canvas.height = 1280;
          const ctx = canvas.getContext('2d');
          
          // Gambar dengan ukuran fix
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          // Watermark
          ctx.font = "bold 30px Arial";
          ctx.fillStyle = "white";
          ctx.fillText("Al-Hanif 1447H", 20, 1250);

          fotoBase64Data = canvas.toDataURL('image/jpeg', 0.6); // Kompresi sama 0.6
          
          document.getElementById('preview').src = fotoBase64Data;
          document.getElementById('preview').style.display = 'block';
          document.getElementById('video').style.display = 'none';
          document.getElementById('btnSubmit').disabled = false;
          document.getElementById('btnSnap').innerHTML = "🔄 ULANG FOTO";
          document.getElementById('btnSnap').style.background = "#e53935";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function uploadDataKeSheet() {
    const petugas = document.getElementById('petugas').value.trim();
    const inisial = document.getElementById('inisial').value.trim();
    const idHewan = document.getElementById('idHewan').value.trim();

    if (!petugas) { alert("⚠️ NAMA PETUGAS WAJIB DIISI!"); return; }
    if (!inisial) { alert("⚠️ INISIAL WAJIB DIISI!"); return; }
    if (!idHewan) { alert("⚠️ NOMOR ID HEWAN WAJIB DIPILIH!"); return; }

    // =========================================================================
    // TAMBAHAN BARU: VALIDASI ANTI-DUPLIKAT (CEGAH KETIK MANUAL)
    // =========================================================================
    const validID = dataDatabaseLokal.find(item => item.id.toString().trim() === idHewan);
    if (!validID) {
      alert("⚠️ NOMOR ID TIDAK VALID ATAU SUDAH DIFOTO!\n\nNomor " + idHewan + " tidak ada di dalam daftar kosong saat ini. Silakan hapus ketikan Anda dan pilih dari pilihan (dropdown) yang tersedia.");
      return; 
    }
    // =========================================================================

    if (!fotoBase64Data) { alert("⚠️ FOTO HEWAN BELUM DIAMBIL! Silakan bidik kamera terlebih dahulu."); return; }

    const btn = document.getElementById('btnSubmit');
    const btnSnap = document.getElementById('btnSnap');
    const status = document.getElementById('status');
    
    btn.disabled = true;
    btnSnap.disabled = true;
    status.style.display = 'block';
    status.style.background = '#fff3cd';
    status.innerText = "Memproses & Mengirim Laporan...";

    const payload = {
      tab: currentTab,
      petugas: petugas,
      inisial: inisial,
      idHewan: idHewan,
      namaPequrban: document.getElementById('txtNama').innerText,
      jenisHQ: document.getElementById('txtJenis').innerText,
      kodeTipe: document.getElementById('kodeTipe').value,
      base64: fotoBase64Data.split(",")[1],
      mimeType: "image/jpeg"
    };

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'contents';
    input.value = JSON.stringify(payload);
    
    form.appendChild(input);
    document.body.appendChild(form);

    const iframeName = 'upload-iframe-target';
    let iframe = document.getElementById(iframeName);
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.id = iframeName;
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    form.target = iframeName;
    form.submit();

    setTimeout(() => {
      let teksSukses = "Berhasil! Foto ID " + payload.idHewan.padStart(3, '0') + " telah tersimpan ke Google Sheet";
      if (currentTab == 3) {
        teksSukses += " & WA Terkirim.";
      } else {
        teksSukses += ".";
      }
      
      status.innerText = teksSukses;
      status.style.background = '#e8f5e9';
      btnSnap.disabled = false;
      document.getElementById('idHewan').value = "";
      document.getElementById('infoBox').style.display = 'none'; 
      resetBidikanKamera();
      form.remove();
      
      setTimeout(updateDropdown, 1500);
    }, 2500);
  }
</script>
</body>
</html>
