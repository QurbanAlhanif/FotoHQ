<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Foto Qurban Al-Hanif</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    .tab-active { background-color: #059669; color: white; border-color: #059669; }
    .tab-inactive { background-color: #f3f4f6; color: #374151; border-color: #d1d5db; }
    #video-container { background-color: #000; width: 100%; height: 60vh; max-height: 400px; position: relative; border-radius: 0.5rem; overflow: hidden; }
    #video, #preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    #camLoadText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; z-index: 10; width: 100%; text-align: center; }
  </style>
</head>
<body class="bg-slate-100 p-4 font-sans max-w-md mx-auto">

  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    
    <!-- HEADER -->
    <div class="bg-emerald-600 p-4 text-white text-center">
      <h1 class="text-xl font-bold tracking-tight">DASHBOARD FOTO</h1>
      <p class="text-emerald-100 text-sm">Qurban Alhanif 1447H</p>
    </div>

    <!-- TABS MENU (Disembunyikan secara default, diatur oleh JS) -->
    <div class="flex p-2 gap-2 bg-slate-50 border-b border-slate-200" id="tabMenuContainer">
      <button id="btnTab1" onclick="pindahTab(1)" class="hidden flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">KANDANG</button>
      <button id="btnTab2" onclick="pindahTab(2)" class="hidden flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">SEMBELIH 1</button>
      <button id="btnTab3" onclick="pindahTab(3)" class="hidden flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">SEMBELIH 2</button>
      <button id="btnTab4" onclick="pindahTab(4)" class="hidden flex-1 py-2 text-xs font-bold rounded-lg border tab-inactive transition-colors">PENGIRIMAN</button>
    </div>

    <div class="p-4 space-y-4">
      
      <!-- IDENTITAS PETUGAS -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-slate-700 uppercase">Nama Petugas</label>
          <input type="text" id="petugas" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500" placeholder="Cth: Ahmad Zawawi" required>
        </div>

      </div>

      <!-- INPUT ID SMART & INFO BOX -->
      <div>
        <label class="text-[10px] font-bold text-slate-700 uppercase">Pilih / Ketik ID Qurban</label>
        <div id="infoLoadingData" class="text-xs text-amber-600 mb-1 font-medium hidden"><i class="fas fa-spinner fa-spin"></i> Mengambil data ID...</div>
        
        <input type="text" id="idHewan" list="listID" autocomplete="off" oninput="cekInfoID()" class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 bg-slate-50 font-bold placeholder-slate-400" placeholder="Ketik Nomor ID...">
        <datalist id="listID"></datalist>

        <!-- KOTAK INFO DATA (Muncul jika 3 digit diketik) -->
        <div id="infoBox" class="mt-2 p-3 bg-blue-50 border border-blue-200 rounded-lg hidden">
           <!-- Akan diisi oleh JavaScript otomatis -->
        </div>
      </div>

      <!-- KAMERA UTAMA -->
      <div id="video-container" class="shadow-inner mt-2">
        <div id="camLoadText">⏳ Menyalakan Kamera...</div>
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display: none;" alt="Hasil Foto">
      </div>

      <button id="btnSnap" onclick="ambilGambar()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">
        <i class="fas fa-camera"></i> AMBIL FOTO
      </button>

      <!-- JALUR DARURAT -->
      <div class="border-t border-slate-200 pt-4 mt-4">
        <label class="text-sm font-bold text-slate-700 uppercase mb-3 block">Kamera Cadangan</label>


        <!-- TAMBAHKAN capture="environment" DI SINI: -->
        <input type="file" id="fileDarurat" accept="image/*" capture="environment" onchange="prosesFotoDarurat(this)" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
        
      </div>

      <!-- TOMBOL UPLOAD -->
      <button id="btnSubmit" onclick="uploadDataKeSheet()" disabled class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-400 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg mt-4">
        <i class="fas fa-cloud-upload-alt"></i> UPLOAD KE SERVER
      </button>
      
      <div id="statusUpload" class="text-center text-sm font-bold mt-2 hidden"></div>

    </div>
  </div>

  <script>
    // =========================================================================
    // KONFIGURASI UTAMA: GANTI DENGAN URL WEB APPS AMIZA!
    // =========================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwu9x3PyUFmlK1sxHHS0b3SjoTLHJTK_a8g0WN-HVMlF6u0gbEiH8RpdbEq6pMqq9lR/exec"; 

    let currentTab = 1;
    let streamObj = null;
    let fotoBase64Data = null;
    let dataDatabaseLokal = [];

    window.onload = () => {
      setModeHari(); 
      aktifkanKameraBelakang();
    };

    // --- LOGIKA URL (hari=h atau page=kirim) ---
    function setModeHari() {
      const urlParams = new URLSearchParams(window.location.search);
      const hari = urlParams.get('hari');
      const page = urlParams.get('page');
      
      // Sudah diperbaiki: 'if' hanya ditulis satu kali
      if (page === 'kirim') {
        // Mode Khusus Pengiriman
        document.getElementById('btnTab4').classList.remove('hidden');
        pindahTab(4);
      } else if (hari === 'h') {
        // Mode Hari H
        document.getElementById('btnTab2').classList.remove('hidden');
        document.getElementById('btnTab3').classList.remove('hidden');
        pindahTab(2); // Buka Sembelih 1 duluan
      } else {
        // Mode Standar
        document.getElementById('btnTab1').classList.remove('hidden');
        pindahTab(1); // Buka Kandang duluan
      }
    }

    // --- NAVIGASI TAB ---
    function pindahTab(tabNum) {
      currentTab = tabNum;
      for(let i=1; i<=4; i++) { // Ubah dari i<=3 menjadi i<=4
        const btn = document.getElementById('btnTab'+i);
        if (btn) {
          if(i === tabNum) {
            btn.classList.replace('tab-inactive', 'tab-active');
          } else {
            btn.classList.replace('tab-active', 'tab-inactive');
          }
        }
      }
      resetBidikanKamera();
      updateDropdown();
    }

    // --- MENGAMBIL DATA DATALIST (ANTI DUPLIKAT & ANTI MACET) ---
    function updateDropdown() {
      const infoLoading = document.getElementById('infoLoadingData');
      infoLoading.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengambil data ID...';
      infoLoading.className = "text-xs text-amber-600 mb-1 font-medium";
      infoLoading.style.display = 'block';
      
      const dl = document.getElementById('listID');
      const inputObj = document.getElementById('idHewan');
      const infoBox = document.getElementById('infoBox');
      
      dl.innerHTML = '';
      inputObj.value = '';
      infoBox.style.display = 'none';
      inputObj.disabled = true; // Kunci input saat loading
      
      const oldScript = document.getElementById('jsonp-ids');
      if (oldScript) oldScript.remove();

      // PENGAMAN: Batas waktu 10 detik. Jika GAS tidak membalas, hentikan putaran!
      let timeoutTerpicu = false;
      const loadingTimeout = setTimeout(() => {
         timeoutTerpicu = true;
         infoLoading.innerHTML = '<i class="fas fa-times-circle"></i> Waktu habis. Server lambat/gagal.';
         infoLoading.className = "text-xs text-red-600 mb-1 font-bold";
      }, 10000);

      window.handleDropdownData = function(list) {
        if(timeoutTerpicu) return; // Abaikan jika sudah keburu error
        clearTimeout(loadingTimeout); // Matikan timer error
        
        infoLoading.style.display = 'none';
        dataDatabaseLokal = list || [];
        
        if(dataDatabaseLokal.length === 0) {
          inputObj.placeholder = "SEMUA FOTO SUDAH LENGKAP";
          inputObj.disabled = true;
        } else {
          inputObj.placeholder = "Ketik no ID...";
          inputObj.disabled = false;
          dataDatabaseLokal.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.id;
            dl.appendChild(opt);
          });
        }
      };

      const script = document.createElement('script');
      script.id = 'jsonp-ids';
      
      // TAMBAHAN ANTI-MACET: Waktu dinamis (&t=) agar browser dipaksa ambil data baru
      const waktuSekarang = new Date().getTime();
      script.src = `${API_URL}?action=getAllData&tab=${currentTab}&callback=handleDropdownData&t=${waktuSekarang}`;
      
      // TAMBAHAN DETEKTOR ERROR: Jika URL salah/mati
      script.onerror = function() {
         clearTimeout(loadingTimeout);
         infoLoading.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal. Silakan refresh Browser!.';
         infoLoading.className = "text-xs text-red-600 mb-1 font-bold";
      };

      document.body.appendChild(script);
    }

    // --- LOGIKA KETIK & MUNCULKAN INFO (SMART INPUT) ---
    function cekInfoID() {
      const inputVal = document.getElementById('idHewan').value.trim();
      const infoBox = document.getElementById('infoBox');
      
      // Sistem akan bereaksi selama ada angka yang diketik (tidak peduli 1, 2, atau 3 digit)
      if (inputVal !== "") {
         
         // SMART MATCH: Cek persis, ATAU samakan nilai angkanya (misal ketik '1' otomatis cocok dengan '001')
         const found = dataDatabaseLokal.find(item => 
           item.id.toString() === inputVal || Number(item.id) === Number(inputVal)
         );
         
         if (found) {
            infoBox.innerHTML = `
              <div class="font-bold text-blue-800 border-b border-blue-200 pb-1 mb-2 text-xs uppercase">DATA DITEMUKAN</div>
              <div class="grid grid-cols-3 gap-1 text-xs">
                <div class="text-slate-500 font-bold">NO ID</div><div class="col-span-2 font-black text-slate-800">: ${found.id}</div>
                <div class="text-slate-500 font-bold">JENIS</div><div class="col-span-2 font-bold text-slate-700">: ${found.jenis}</div>
                <div class="text-slate-500 font-bold">NAMA</div><div class="col-span-2 font-bold text-slate-700">: ${found.nama}</div>
              </div>
            `;
            infoBox.style.display = 'block';
         } else {
            infoBox.innerHTML = `<div class="text-amber-600 font-bold text-xs"><i class="fas fa-search"></i> ID ${inputVal} tidak ada atau sudah selesai difoto.</div>`;
            infoBox.style.display = 'block';
         }
      } else {
         infoBox.style.display = 'none';
      }
    }

    // --- KAMERA UTAMA ---
    async function aktifkanKameraBelakang() {
      const video = document.getElementById('video');
      const camLoadText = document.getElementById('camLoadText');
      
      if (streamObj) {
        streamObj.getTracks().forEach(track => track.stop());
      }
      
      camLoadText.style.display = 'block';
      camLoadText.innerText = '⏳ Menyalakan Kamera...';
      video.style.display = 'block';
      document.getElementById('preview').style.display = 'none';

      try {
        // PERUBAHAN DI SINI: Minta browser menarik resolusi paling maksimal (Ideal 4K)
        const constraints = { 
          video: { 
            facingMode: { exact: "environment" },
            width: { ideal: 3840 }, 
            height: { ideal: 2160 } 
          } 
        };
        
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        streamObj = stream;
        video.srcObject = stream;
        video.onplaying = () => { camLoadText.style.display = 'none'; };
      } catch (err) {
        try {
          // Fallback juga dipaksa resolusi tinggi
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: { ideal: 3840 }, height: { ideal: 2160 } } 
          });
          streamObj = fallbackStream;
          video.srcObject = fallbackStream;
          video.onplaying = () => { camLoadText.style.display = 'none'; };
        } catch (e) {
          camLoadText.innerText = "❌ Kamera Tidak Ditemukan";
        }
      }
    }

   // --- PROSES BIDIK GAMBAR (AUTO-CROP & AUTO-ORIENTATION) ---
    function ambilGambar() {
      const video = document.getElementById('video');
      const preview = document.getElementById('preview');
      const btnSnap = document.getElementById('btnSnap');
      const btnSubmit = document.getElementById('btnSubmit');

      if (btnSnap.innerText.includes("AMBIL FOTO")) {
        const canvas = document.createElement('canvas');
        
        // 1. SET CANVAS SESUAI ORIENTASI VIDEO ASLI
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');

        // 2. DRAW VIDEO LANGSUNG KE CANVAS TANPA CROP PAKSAAN
        // Ini memastikan orientasi yang dilihat di layar adalah yang disimpan
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // 3. Kompresi tetap 0.85
        fotoBase64Data = canvas.toDataURL('image/jpeg', 0.85); 

        preview.src = fotoBase64Data;
        preview.style.display = 'block';
        video.style.display = 'none'; 
        
        if (streamObj) streamObj.getTracks().forEach(track => track.stop());

        btnSnap.innerHTML = '<i class="fas fa-undo"></i> ULANG FOTO';
        btnSnap.classList.replace('bg-slate-800', 'bg-red-600');
        btnSubmit.disabled = false;
      } else {
        resetBidikanKamera();
        aktifkanKameraBelakang(); 
      }
    }

    function resetBidikanKamera() {
      fotoBase64Data = null;
      document.getElementById('preview').style.display = 'none';
      document.getElementById('video').style.display = 'block';
      document.getElementById('btnSubmit').disabled = true;
      document.getElementById('fileDarurat').value = "";
      
      const btnSnap = document.getElementById('btnSnap');
      btnSnap.innerHTML = '<i class="fas fa-camera"></i> AMBIL FOTO';
      btnSnap.classList.replace('bg-red-600', 'bg-slate-800');
      btnSnap.classList.replace('hover:bg-red-700', 'hover:bg-slate-700');
    }

    // --- JALUR FOTO DARURAT STABIL ---
    function prosesFotoDarurat(input) {
      if (input.files && input.files[0]) {
        document.getElementById('camLoadText').style.display = 'none';
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            fotoBase64Data = canvas.toDataURL('image/jpeg', 0.5);
            
            document.getElementById('preview').src = fotoBase64Data;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('video').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
            
            const btnSnap = document.getElementById('btnSnap');
            btnSnap.innerHTML = '<i class="fas fa-undo"></i> ULANG FOTO';
            btnSnap.classList.replace('bg-slate-800', 'bg-red-600');
            btnSnap.classList.replace('hover:bg-slate-700', 'hover:bg-slate-700');
            if (streamObj) streamObj.getTracks().forEach(track => track.stop());
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // --- PENGIRIMAN DATA KE GOOGLE SERVER ---
    function uploadDataKeSheet() {
      const petugas = document.getElementById('petugas').value.trim();
      const idHewan = document.getElementById('idHewan').value.trim();

      // ==========================================================
      // VALIDASI KOTAK KOSONG (NOTIFIKASI SPESIFIK)
      // ==========================================================
      if (!petugas) {
        alert("⚠️ NAMA PETUGAS belum diisi! Silakan isi terlebih dahulu.");
        document.getElementById('petugas').focus();
        return;
      }

      if (!idHewan) {
        alert("⚠️ NOMOR ID HEWAN belum diketik! Silakan ketik ID-nya.");
        document.getElementById('idHewan').focus();
        return;
      }
      // ==========================================================


      // Validasi Anti-Duplikat (Smart Match)
      const validID = dataDatabaseLokal.find(item => 
        item.id.toString() === idHewan || Number(item.id) === Number(idHewan)
      );

      if (!fotoBase64Data) {
        alert("⚠️ Foto belum diambil!");
        return;
      }

      const btnSubmit = document.getElementById('btnSubmit');
      const statusDiv = document.getElementById('statusUpload');
      
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MENGUPLOAD...';
      statusDiv.style.display = 'block';
      statusDiv.className = 'text-center text-sm font-bold mt-2 text-blue-600';
      statusDiv.innerText = "Mengirim data ke server, mohon tunggu...";

      const base64DataMurni = fotoBase64Data.split(',')[1];

      const payload = {
        tab: currentTab,
        petugas: petugas,

        idHewan: validID.id,
        namaPequrban: validID.nama,
        kodeTipe: validID.kodeTipe || "HQ",
        mimeType: 'image/jpeg',
        base64: base64DataMurni
      };

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        statusDiv.className = 'text-center text-sm font-bold mt-2 text-emerald-600';
        statusDiv.innerText = "✅ " + (result.status || "Upload Berhasil!");
        alert("Upload Berhasil!");
        
        resetBidikanKamera();
        aktifkanKameraBelakang();
        updateDropdown(); // Memanggil ulang data dari server (ID yang sudah diupload otomatis hilang)
        document.getElementById('idHewan').value = ''; // Kosongkan form input
        document.getElementById('infoBox').style.display = 'none'; // Sembunyikan kotak info
        btnSubmit.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> UPLOAD KE SERVER';
      })
      .catch(error => {
        console.error('Error:', error);
        statusDiv.className = 'text-center text-sm font-bold mt-2 text-red-600';
        statusDiv.innerText = "❌ Terjadi Kesalahan. Coba lagi.";
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> COBA UPLOAD LAGI';
        alert("Gagal mengupload foto. Silakan coba lagi.");
      });
    }
  </script>
</body>
</html>
